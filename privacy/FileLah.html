<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">

  <title>Privacy Policy — FileLah</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="./privacy.css" />
</head>
<body>
  <div class="page-header">
    <h1>Privacy Policy</h1>
    <p>FileLah · SABOYEN STUDIO</p>
  </div>
  <div class="accent-bar"></div>
  <div class="page">
    <div class="content-card" id="policy-body"></div>
  </div>
  <script>
    var vars = {
      '##APP_NAME##':       'FileLah',
      '##DEVELOPER_NAME##': 'SABOYEN STUDIO',
      '##DEV_EMAIL##':      'saboyen343@gmail.com',
      '##SDATE##':          '2025-06-25'
    };

    fetch('./form.html')
      .then(function(r) { return r.text(); })
      .then(function(html) {
        Object.keys(vars).forEach(function(k) {
          html = html.split(k).join(vars[k]);
        });
        document.getElementById('policy-body').innerHTML = html;
      });
  </script>
</body>
