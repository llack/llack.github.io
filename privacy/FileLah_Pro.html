<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <meta name="robots" content="noindex">
  <title>Privacy Policy</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="./privacy.css" />
</head>
<body>
  <div class="page-header">
    <h1>Privacy Policy</h1>
    <p id="app-name"></p>
  </div>
  <div class="accent-bar"></div>
  <div class="page">
    <div class="content-card" id="policy-body"></div>
  </div>
  <script>
    var vars = {
      '##APP_NAME##': 'FileLah Pro',
      '##SDATE##':    '2025-06-25'
    };

    var appName = vars['##APP_NAME##'];
    document.title = 'Privacy Policy | ' + appName;
    document.getElementById('app-name').textContent = appName;

    fetch('./form.html')
      .then(function(r) { return r.text(); })
      .then(function(html) {
        Object.keys(vars).forEach(function(k) {
          html = html.split(k).join(vars[k]);
        });
        document.getElementById('policy-body').innerHTML = html;
      });
  </script>
</body>
</html>
